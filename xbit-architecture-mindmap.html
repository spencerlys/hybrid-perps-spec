<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XBIT Perp Engine — 全模块架构脑图</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0e1a; color: #e0e0e0; overflow: hidden; }

  #app { display: flex; height: 100vh; }

  /* Sidebar */
  #sidebar { width: 320px; min-width: 320px; background: #111827; border-right: 1px solid #1e293b; display: flex; flex-direction: column; z-index: 10; }
  #sidebar-header { padding: 20px; border-bottom: 1px solid #1e293b; }
  #sidebar-header h2 { font-size: 16px; color: #60a5fa; margin-bottom: 4px; }
  #sidebar-header p { font-size: 11px; color: #6b7280; }
  #layer-list { flex: 1; overflow-y: auto; padding: 8px; }
  .layer-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 4px; transition: all .2s; border-left: 3px solid transparent; }
  .layer-item:hover { background: #1e293b; }
  .layer-item.active { background: #1e293b; border-left-color: #60a5fa; }
  .layer-item .layer-tag { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; margin-right: 6px; display: inline-block; min-width: 28px; text-align: center; }
  .layer-item .layer-name { font-size: 13px; font-weight: 600; }
  .layer-item .layer-desc { font-size: 11px; color: #6b7280; margin-top: 2px; }

  /* Main canvas */
  #main { flex: 1; display: flex; flex-direction: column; position: relative; }
  #top-bar { height: 52px; background: #111827; border-bottom: 1px solid #1e293b; display: flex; align-items: center; padding: 0 24px; gap: 12px; }
  #top-bar h1 { font-size: 18px; font-weight: 700; color: #f9fafb; flex: 1; }
  .phase-badge { font-size: 10px; padding: 3px 8px; border-radius: 10px; font-weight: 600; }
  .phase-1 { background: #064e3b; color: #6ee7b7; }
  .phase-2 { background: #1e3a5f; color: #7dd3fc; }
  .phase-3 { background: #4c1d95; color: #c4b5fd; }
  .phase-4 { background: #78350f; color: #fcd34d; }
  #legend { display: flex; gap: 12px; }
  #legend span { font-size: 10px; display: flex; align-items: center; gap: 4px; }
  #legend .dot { width: 8px; height: 8px; border-radius: 50%; }

  #canvas-area { flex: 1; overflow: auto; padding: 32px; }

  /* Module detail panel */
  #detail-panel { position: absolute; right: 0; top: 52px; bottom: 0; width: 420px; background: #111827; border-left: 1px solid #1e293b; transform: translateX(100%); transition: transform .3s ease; z-index: 20; overflow-y: auto; }
  #detail-panel.open { transform: translateX(0); }
  #detail-close { position: absolute; top: 12px; right: 12px; background: none; border: none; color: #9ca3af; font-size: 20px; cursor: pointer; }
  #detail-content { padding: 24px; }
  #detail-content h3 { font-size: 18px; color: #f9fafb; margin-bottom: 4px; }
  #detail-content .detail-layer { font-size: 11px; color: #60a5fa; margin-bottom: 16px; }
  #detail-content .detail-section { margin-bottom: 16px; }
  #detail-content .detail-section h4 { font-size: 13px; color: #9ca3af; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .5px; }
  #detail-content .detail-item { background: #1e293b; border-radius: 6px; padding: 10px 12px; margin-bottom: 6px; font-size: 12px; line-height: 1.5; }
  #detail-content .detail-item .item-title { font-weight: 600; color: #e5e7eb; }
  #detail-content .detail-item .item-desc { color: #9ca3af; margin-top: 2px; }
  .tag-api { background: #1e3a5f; color: #7dd3fc; font-size: 9px; padding: 1px 5px; border-radius: 3px; margin-left: 6px; }
  .tag-ws { background: #4c1d95; color: #c4b5fd; font-size: 9px; padding: 1px 5px; border-radius: 3px; margin-left: 6px; }
  .tag-admin { background: #78350f; color: #fcd34d; font-size: 9px; padding: 1px 5px; border-radius: 3px; margin-left: 6px; }
  .tag-internal { background: #064e3b; color: #6ee7b7; font-size: 9px; padding: 1px 5px; border-radius: 3px; margin-left: 6px; }
  .tag-db { background: #581c87; color: #d8b4fe; font-size: 9px; padding: 1px 5px; border-radius: 3px; margin-left: 6px; }

  /* Mind map nodes */
  .layer-section { margin-bottom: 32px; }
  .layer-section-title { font-size: 14px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .layer-section-title .lnum { font-size: 11px; padding: 3px 8px; border-radius: 6px; font-weight: 700; }
  .modules-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
  .module-card { background: #1e293b; border: 1px solid #2d3748; border-radius: 10px; padding: 14px; cursor: pointer; transition: all .2s; position: relative; }
  .module-card:hover { border-color: #60a5fa; transform: translateY(-2px); box-shadow: 0 4px 16px rgba(96,165,250,.15); }
  .module-card .mc-name { font-size: 13px; font-weight: 600; color: #f9fafb; margin-bottom: 4px; }
  .module-card .mc-desc { font-size: 11px; color: #9ca3af; line-height: 1.4; }
  .module-card .mc-tags { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
  .module-card .mc-tag { font-size: 9px; padding: 2px 6px; border-radius: 3px; font-weight: 600; }
  .mc-phase { position: absolute; top: 8px; right: 8px; font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 700; }
  .mc-count { font-size: 10px; color: #6b7280; margin-top: 6px; }

  /* Colors per layer */
  .lc-1 { background: #1a3a2a; border-color: #22c55e; } .lc-1 .lnum { background: #166534; color: #86efac; }
  .lc-2 { background: #1a2a3a; border-color: #3b82f6; } .lc-2 .lnum { background: #1e40af; color: #93c5fd; }
  .lc-3 { background: #2a1a2a; border-color: #a855f7; } .lc-3 .lnum { background: #6b21a8; color: #d8b4fe; }
  .lc-4 { background: #2a2a1a; border-color: #eab308; } .lc-4 .lnum { background: #854d0e; color: #fde047; }
  .lc-5 { background: #2a1a1a; border-color: #ef4444; } .lc-5 .lnum { background: #991b1b; color: #fca5a5; }
  .lc-6 { background: #1a2a2a; border-color: #14b8a6; } .lc-6 .lnum { background: #115e59; color: #5eead4; }
  .lc-7 { background: #1a1a2a; border-color: #8b5cf6; } .lc-7 .lnum { background: #5b21b6; color: #c4b5fd; }
  .lc-8 { background: #2a1f1a; border-color: #f97316; } .lc-8 .lnum { background: #9a3412; color: #fdba74; }
  .lc-9 { background: #1a2a25; border-color: #06b6d4; } .lc-9 .lnum { background: #155e75; color: #67e8f9; }
  .lc-relay { background: #2a2020; border-color: #f43f5e; } .lc-relay .lnum { background: #9f1239; color: #fda4af; }
  .lc-infra { background: #1f1f2a; border-color: #6366f1; } .lc-infra .lnum { background: #3730a3; color: #a5b4fc; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }

  /* Stats bar */
  #stats-bar { padding: 12px 24px; background: #0f172a; border-top: 1px solid #1e293b; display: flex; gap: 24px; font-size: 11px; color: #6b7280; }
  #stats-bar .stat-val { color: #f9fafb; font-weight: 700; }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <h2>XBIT Perp Engine</h2>
      <p>方案 2: 内部对赌 + 阈值对冲</p>
    </div>
    <div id="layer-list"></div>

  <div id="main">

    <div id="detail-panel">
      <button id="detail-close">&times;</button>
      <div id="detail-content"></div>
    </div>
  </div>
</div>

// Render sidebar
const layerList = document.getElementById('layer-list');
const canvasArea = document.getElementById('canvas-area');
const detailPanel = document.getElementById('detail-panel');
const detailContent = document.getElementById('detail-content');
const statsBar = document.getElementById('stats-bar');

let activeLayer = null;

function renderSidebar() {
  layerList.innerHTML = DATA.layers.map(l => `
    <div class="layer-item" data-id="${l.id}" onclick="scrollToLayer('${l.id}')">
      <span class="layer-tag lc-${l.color}" style="display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;">${l.tag}</span>
      <span class="layer-name">${l.name}</span>
      <div class="layer-desc">${l.desc}</div>
    </div>
  `).join('');
}

function phaseColor(p) {
  return { 1: '#6ee7b7', 2: '#7dd3fc', 3: '#c4b5fd', 4: '#fcd34d' }[p] || '#9ca3af';
}
function phaseBg(p) {
  return { 1: '#064e3b', 2: '#1e3a5f', 3: '#4c1d95', 4: '#78350f' }[p] || '#374151';
}

function tagHTML(t) {
  const cls = { api: 'tag-api', ws: 'tag-ws', admin: 'tag-admin', internal: 'tag-internal', db: 'tag-db' };
  return `<span class="${cls[t] || 'tag-internal'}">${t.toUpperCase()}</span>`;
}

function renderCanvas() {
  canvasArea.innerHTML = DATA.layers.map(l => `
    <div class="layer-section" id="layer-${l.id}">
      <div class="layer-section-title lc-${l.color}">
        <span class="lnum">${l.tag}</span>
        ${l.name}
        <span style="font-size:11px;font-weight:400;color:#6b7280;margin-left:8px;">${l.desc}</span>
        <span style="margin-left:auto;font-size:10px;padding:2px 8px;border-radius:10px;background:${phaseBg(l.phase)};color:${phaseColor(l.phase)};font-weight:600;">Phase ${l.phase}</span>
      </div>
      <div class="modules-grid">
        ${l.modules.map((m, mi) => `
          <div class="module-card" onclick="showDetail('${l.id}', ${mi})">
            <span class="mc-phase" style="background:${phaseBg(m.phase)};color:${phaseColor(m.phase)}">P${m.phase}</span>
            <div class="mc-name">${m.name}</div>
            <div class="mc-desc">${m.desc}</div>
            <div class="mc-count">${m.details.length} 个功能点</div>
            <div class="mc-tags">
              ${[...new Set(m.details.flatMap(d => d.tags))].map(t => `<span class="mc-tag" style="background:${
                { api:'#1e3a5f', ws:'#4c1d95', admin:'#78350f', internal:'#064e3b', db:'#581c87' }[t]
              };color:${
                { api:'#7dd3fc', ws:'#c4b5fd', admin:'#fcd34d', internal:'#6ee7b7', db:'#d8b4fe' }[t]
              }">${t.toUpperCase()}</span>`).join('')}
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function showDetail(layerId, moduleIdx) {
  const layer = DATA.layers.find(l => l.id === layerId);
  const mod = layer.modules[moduleIdx];
  detailContent.innerHTML = `
    <h3>${mod.name}</h3>
    <div class="detail-layer">${layer.tag} ${layer.name} · Phase ${mod.phase}</div>
    <div class="detail-section">
      <h4>功能清单 (${mod.details.length})</h4>
      ${mod.details.map(d => `
        <div class="detail-item">
          <div class="item-title">${d.title} ${d.tags.map(t => tagHTML(t)).join('')}</div>
          <div class="item-desc">${d.desc}</div>
        </div>
      `).join('')}
    </div>
  `;
  detailPanel.classList.add('open');
}

document.getElementById('detail-close').onclick = () => detailPanel.classList.remove('open');

function scrollToLayer(id) {
  document.querySelectorAll('.layer-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`.layer-item[data-id="${id}"]`).classList.add('active');
  document.getElementById(`layer-${id}`).scrollIntoView({ behavior: 'smooth', block: 'start' });
  detailPanel.classList.remove('open');
}

// Stats
function renderStats() {
  let totalModules = 0, totalFeatures = 0, phases = {};
  DATA.layers.forEach(l => {
    l.modules.forEach(m => {
      totalModules++;
      totalFeatures += m.details.length;
      phases[m.phase] = (phases[m.phase] || 0) + 1;
    });
  });
  statsBar.innerHTML = `
    <span>架构层: <span class="stat-val">${DATA.layers.length}</span></span>
    <span>模块: <span class="stat-val">${totalModules}</span></span>
    <span>功能点: <span class="stat-val">${totalFeatures}</span></span>
    <span>Phase 1: <span class="stat-val">${phases[1]||0} 模块</span></span>
    <span>Phase 2: <span class="stat-val">${phases[2]||0} 模块</span></span>
    <span>Phase 3: <span class="stat-val">${phases[3]||0} 模块</span></span>
  `;
}

renderSidebar();
renderCanvas();
renderStats();
